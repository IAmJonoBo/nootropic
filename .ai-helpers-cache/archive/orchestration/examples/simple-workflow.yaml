name: SimpleContentReviewWorkflow
description: Example workflow with content creation and review steps.
steps:
  - id: createContent
    agent: ContentAgent
    input:
      prompt: "Write a short summary about AI agent frameworks."
    dependsOn: []
  - id: reviewContent
    agent: ReviewAgent
    input:
      contentRef: createContent
    dependsOn:
      - createContent
metadata:
  author: "nootropic Example"
  created: "2025-05-20" 