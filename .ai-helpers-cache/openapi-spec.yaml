paths:
  '/capability/EnsembleAgent':
    get:
      summary: "EnsembleAgent"
      description: "Orchestrates multi-LLM code generation, modular voting/selection (majority, weighted, syntactic, semantic, behavioral, meta-LLM), self-debugging, and event-driven mutation/self-healing integration. Emits rationale/explanation and votingRationale events for each step. Implements Capability interface. Reference: arXiv:2503.15838v1, AutoGen, LangGraph."
      responses:
        '200':
          description: Capability description
          content:
            application/json:
              schema:
                type: object
  '/capability/FormalVerifierAgent':
    get:
      summary: "FormalVerifierAgent"
      description: "Integrates LLM-driven spec generation, formal verification (TLA+, Coq, Lean), and event-driven repair. Emits rationale/explanation for each step. References TLA+, Coq, Lean, tenspiler, arXiv:2505.02500v1."
      responses:
        '200':
          description: Capability description
          content:
            application/json:
              schema:
                type: object
  '/capability/MultimodalAgent':
    get:
      summary: "MultimodalAgent"
